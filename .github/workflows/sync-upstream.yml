name: Sync Upstream

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: helium-linux-sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Rebuild custom branch from upstream and update submodule
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/imputnet/helium-linux.git 2>/dev/null || true
          git remote set-url upstream https://github.com/imputnet/helium-linux.git
          git fetch origin main
          git fetch upstream main --no-tags

          origin_tree=$(git rev-parse origin/main^{tree})
          git reset --hard upstream/main

          git checkout origin/main -- \
            .github/actions/build/action.yml \
            .github/actions/package/action.yml \
            .github/actions/release/action.yml \
            .github/scripts/export-cache.sh \
            .github/scripts/import-cache.sh \
            .github/workflows \
            docker/build.Dockerfile \
            patches/series \
            patches/helium/linux/add-middle-click-paste-flag.patch \
            patches/helium/linux/disable-ctrl-shift-c-and-tab-detach.patch \
            scripts/package.sh \
            scripts/shared.sh

          while IFS= read -r workflow_file; do
            git cat-file -e "origin/main:${workflow_file}" 2>/dev/null || git rm -f -- "${workflow_file}"
          done < <(git ls-files .github/workflows)

          git rm -f .github/workflows/bump.yml 2>/dev/null || true

          git submodule sync --recursive
          git submodule update --init --remote helium-chromium

          git add -A
          desired_tree=$(git write-tree)

          if [ "$desired_tree" = "$origin_tree" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sync_commit=$(
            git commit-tree "$desired_tree" \
              -p origin/main \
              -m "sync: reapply custom linux automation"
          )
          git reset --hard "$sync_commit"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push synced branch
        if: steps.sync.outputs.changed == 'true'
        shell: bash
        run: git push origin HEAD:main

      - name: Dispatch build and release
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/build.yml/dispatches" \
            -f ref=main \
            -F inputs[runner]=ubuntu-latest \
            -F inputs[do-release]=true
