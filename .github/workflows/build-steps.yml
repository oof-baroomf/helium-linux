name: Building Linux AppImage for Helium

defaults:
  run:
    shell: bash

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runs-on:
        required: true
        type: string

permissions:
  contents: read

env:
  ARCH: ${{ inputs.arch }}

jobs:
  prep:
    name: Prepare resources
    runs-on: ${{ inputs.runs-on }}
    outputs:
      cache_name: ${{ steps.prepare.outputs.cache_name }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with: { submodules: true }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and cache Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/build.Dockerfile
          tags: chromium-builder:trixie-slim
          outputs: type=docker,dest=/tmp/chromium-builder.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.arch }}
          path: /tmp/chromium-builder.tar
          retention-days: 1

      - name: Prepare build tree
        id: prepare
        uses: ./.github/actions/build
        with:
          prepare-only: true
          upload-cache-name: build-cache-${{ inputs.arch }}-prep

  build_part_01:
    runs-on: ${{ inputs.runs-on }}
    needs: prep
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.prep.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part01

  build_part_02:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_01.outputs.status == 'running'
    needs: build_part_01
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_01.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part02

  build_part_03:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_02.outputs.status == 'running'
    needs: build_part_02
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_02.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part03

  build_part_04:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_03.outputs.status == 'running'
    needs: build_part_03
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_03.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part04

  build_part_05:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_04.outputs.status == 'running'
    needs: build_part_04
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_04.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part05

  build_part_06:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_05.outputs.status == 'running'
    needs: build_part_05
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_05.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part06

  build_part_07:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_06.outputs.status == 'running'
    needs: build_part_06
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_06.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part07

  build_part_08:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_07.outputs.status == 'running'
    needs: build_part_07
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_07.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part08

  build_part_09:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_08.outputs.status == 'running'
    needs: build_part_08
    outputs:
      status: ${{ steps.build.outputs.status }}
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          download-cache-name: ${{ needs.build_part_08.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part09

  build_part_10:
    runs-on: ${{ inputs.runs-on }}
    if: needs.build_part_09.outputs.status == 'running'
    needs: build_part_09
    outputs:
      cache_name: ${{ steps.build.outputs.cache_name }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/build
        id: build
        with:
          final: true
          download-cache-name: ${{ needs.build_part_09.outputs.cache_name }}
          upload-cache-name: build-cache-${{ inputs.arch }}-part10

  package:
    runs-on: ${{ inputs.runs-on }}
    if: ${{ !cancelled() && !failure()
            && contains(fromJSON('["success", "skipped"]'),
                        needs.build_part_10.result) }}
    needs:
      - prep
      - build_part_01
      - build_part_02
      - build_part_03
      - build_part_04
      - build_part_05
      - build_part_06
      - build_part_07
      - build_part_08
      - build_part_09
      - build_part_10
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: ./.github/actions/package
        with:
          cache-name: ${{ needs.build_part_10.outputs.cache_name || needs.build_part_09.outputs.cache_name || needs.build_part_08.outputs.cache_name || needs.build_part_07.outputs.cache_name || needs.build_part_06.outputs.cache_name || needs.build_part_05.outputs.cache_name || needs.build_part_04.outputs.cache_name || needs.build_part_03.outputs.cache_name || needs.build_part_02.outputs.cache_name || needs.build_part_01.outputs.cache_name || needs.prep.outputs.cache_name }}
          private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
